<!-- SAVINGS PAGE -->
<div id="page-savings" class="page">
<div class="topbar">
<div>
<h1 class="page-title">Savings Goals</h1>
<p class="page-sub">Track your progress towards your goals</p>
</div>
<div class="topbar-right">
<button class="add-btn" onclick="addGoal()">+ New Goal</button>
</div>
</div>

<div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
<div class="stat-card accent-card">
<div class="stat-header"><span class="stat-label">Total Saved</span></div>
<div class="stat-value">$14,200</div>
<div class="stat-change">Across 4 goals</div>
</div>
<div class="stat-card">
<div class="stat-header"><span class="stat-label">Total Target</span></div>
<div class="stat-value">$36,000</div>
<div class="stat-change up">39.4% achieved</div>
</div>
<div class="stat-card">
<div class="stat-header"><span class="stat-label">Monthly Saved</span></div>
<div class="stat-value">$2,850</div>
<div class="stat-change up">▲ +12% this month</div>
</div>
</div>

<div class="charts-grid">
<div class="chart-card">
<div class="chart-header">
<div class="chart-title">Goals Progress</div>
<div class="chart-sub">All goals overview</div>
</div>
<div style="height:200px"><canvas id="savingsChart"></canvas></div>
</div>
<div class="goals-card">
<div class="section-header">
<div class="section-title">Your Goals</div>
</div>
<div id="goals-list"></div>
</div>
</div>
</div>
