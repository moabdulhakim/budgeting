3FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="313" x="15" y="154.375">component "Web Application" as WebUI</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="0" x="10" y="170.6719"/><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="213" x="15" y="186.9688">component "Dashboard UI"</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="230" x="15" y="203.2656">component "Transactions UI"</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="184" x="15" y="219.5625">component "Budget UI"</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="190" x="15" y="235.8594">component "Reports UI"</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="172" x="15" y="252.1563">component "Goals UI"</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="226" x="15" y="268.4531">component "Notifications UI"</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="0" x="10" y="284.75"/><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="219" x="15" y="301.0469">MobileUI --&gt; "Dashboard UI"</text><text fill="#FF0000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="106" x="10" y="317.3438">Syntax Error?</text><!--MD5=[e931bf2fb73c4f6ab28e3d99c10e764b]
@startuml
title Layered Architecture - Personal Budgeting System

package "Presentation Layer (UI)" {

  component "Mobile App (Android / iOS)" as MobileUI
  component "Web Application" as WebUI

  component "Dashboard UI"
  component "Transactions UI"
  component "Budget UI"
  component "Reports UI"
  component "Goals UI"
  component "Notifications UI"

  MobileUI - -> "Dashboard UI"
  MobileUI - -> "Transactions UI"
  MobileUI - -> "Budget UI"
  MobileUI - -> "Reports UI"
  MobileUI - -> "Goals UI"
  MobileUI - -> "Notifications UI"

  WebUI - -> "Dashboard UI"
  WebUI - -> "Transactions UI"
  WebUI - -> "Budget UI"
  WebUI - -> "Reports UI"
  WebUI - -> "Goals UI"
  WebUI - -> "Notifications UI"
}

package "Application Layer (Business Logic)" {

  component "Authentication Module"
  component "User Management Module"
  component "Transaction Management Module"
  component "Budget Management Module"
  component "Category Management Module"
  component "Goal Management Module"
  component "Report Module"
  component "Notification Module"
}

package "Data Layer" {

  database "Main Database\n(AES-256 Encrypted)" as DB

  component "User Repository"
  component "Transaction Repository"
  component "Budget Repository"
  component "Category Repository"
  component "Goal Repository"
  component "Notification Repository"
}

package "External Systems" {
  component "Bank API (OAuth2)" as BankAPI
  component "E-Wallet API" as WalletAPI
}


MobileUI - -> "Authentication Module"
WebUI - -> "Authentication Module"

"Dashboard UI" - -> "Transaction Management Module"
"Transactions UI" - -> "Transaction Management Module"
"Budget UI" - -> "Budget Management Module"
"Reports UI" - -> "Report Module"
"Goals UI" - -> "Goal Management Module"
"Notifications UI" - -> "Notification Module"

"User Management Module" - -> "User Repository"
"Transaction Management Module" - -> "Transaction Repository"
"Budget Management Module" - -> "Budget Repository"
"Category Management Module" - -> "Category Repository"
"Goal Management Module" - -> "Goal Repository"
"Notification Module" - -> "Notification Repository"

"User Repository" - -> DB
"Transaction Repository" - -> DB
"Budget Repository" - -> DB
"Category Repository" - -> DB
"Goal Repository" - -> DB
"Notification Repository" - -> DB

"Transaction Management Module" - -> BankAPI
"Transaction Management Module" - -> WalletAPI

@enduml

