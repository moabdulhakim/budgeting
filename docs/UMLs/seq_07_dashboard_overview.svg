gAndGlyphs" textLength="219" x="246.5" y="347.2466">_persist_dashboard_notifications()</text><polygon fill="#383838" points="728,405.5781,738,409.5781,728,413.5781,732,409.5781" style="stroke: #383838; stroke-width: 1.0;"/><line style="stroke: #383838; stroke-width: 1.0;" x1="239.5" x2="734" y1="409.5781" y2="409.5781"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="151" x="246.5" y="389.3794">objects.filter(...).exists()</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="218" x="246.5" y="404.5122">→ objects.create(...) for new alerts</text><polygon fill="#383838" points="41.5,464.7109,31.5,468.7109,41.5,472.7109,37.5,468.7109" style="stroke: #383838; stroke-width: 1.0;"/><line style="stroke: #383838; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="35.5" x2="233.5" y1="468.7109" y2="468.7109"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="175" x="47.5" y="463.645">render(index.html, context)</text><!--MD5=[b99cfba6eb7bd003a78b7a6cbdcadf8f]
@startuml seq_07_dashboard_overview
title (7) Dashboard Overview — getDashboard reads Tx/Cat; persists Notification
skinparam monochrome true
skinparam shadowing false

actor "Client" as C
participant "getDashboard" as D
participant "Transaction" as Tx
participant "Category" as Cat
participant "Notification" as N

C -> D : GET (dashboard index)
activate D
D -> Tx : objects.filter(user, type=income|expense)
D -> Tx : aggregate Sum, monthly filters, charts
D -> Tx : objects.filter(order by date)[:5] recent
D -> Cat : objects.filter(user)
D -> Tx : per-category expense Sum (month)
D -> Tx : upcoming bills query (is_upcoming, due_date)
D -> D : _persist_dashboard_notifications()
D -> N : objects.filter(...).exists()\n→ objects.create(...) for new alerts
activate N
deactivate N
D - -> C : render(index.html, context)
deactivate D
@enduml

