name: Generate PlantUML Diagrams

on:
  push:
    paths:
      - '**.puml'      # هيشتغل بس لو حد عدل في ملفات الـ PlantUML
      - '**.plantuml'

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ضروري عشان الـ Action يقدر يعمل Push للصور

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # عشان يجيب الـ History كله ويقدر يعمل Commit صح

      - name: Install PlantUML & Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz

      - name: Generate PNG Images from UML
        run: |
          # هيلف على كل الملفات اللي امتدادها .puml ويحولها لصور في نفس الفولدر
          find . -name "*.puml" -exec plantuml -tpng {} \;
          find . -name "*.plantuml" -exec plantuml -tpng {} \;

      - name: Commit and Push Generated Images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-generate PlantUML images"
          file_pattern: "*.png"
