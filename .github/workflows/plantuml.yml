name: Generate High-Quality UML Diagrams

on:
  push:
    paths:
      - '**.puml'
      - '**.plantuml'
  workflow_dispatch: # بيسمح لك تشغل الأكشن مانيوال لو احتجت

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري عشان الأكشن يقدر يرفع الصور الجديدة للـ Repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PlantUML & Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz

      - name: Generate SVG Diagrams
        run: |
          # الكود ده بيلف على كل الملفات ويحولها لـ SVG بجودة خرافية
          find . -name "*.puml" -exec plantuml -tsvg {} \;
          find . -name "*.plantuml" -exec plantuml -tsvg {} \;

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-generate high-quality UML SVGs"
          file_pattern: "*.svg"
