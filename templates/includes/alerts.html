{% if budget_warning %}
<div id="limit-alert" class="alert-banner" style="margin: 0 0 20px 0;">
  <div class="alert-content">
    <span class="alert-icon">⚠️</span>
    <div class="alert-msg">
      <strong>Budget Warning:</strong> You've spent over 90% of your
      <span id="alert-category-name">{{ budget_warning.category }}</span> budget!
    </div>
  </div>
  <button class="alert-close" onclick="this.parentElement.style.display='none'">×</button>
</div>
{% endif %}

{% if upcoming_payment %}
<div id="upcoming-payment-alert" class="alert-banner payment-alert" style="margin: 0 0 20px 0;">
  <div class="alert-content">
    <span class="alert-icon">📅</span>
    <div class="alert-msg" id="payment-details-msg">
      <strong>Upcoming Payment:</strong> {{ upcoming_payment.description }} of
      ${{ upcoming_payment.amount }} is due on {{ upcoming_payment.due_date }}.
    </div>
  </div>
  <button class="alert-close" onclick="this.parentElement.style.display='none'">×</button>
</div>
{% endif %}
