<div id="category-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="category-modal-title" style="font-size: 1.25rem; font-weight: 700;">Add Budget Category</h2>
    </div>

    <form method="POST" action="{% url 'add_category' %}" id="category-form">
      {% csrf_token %}
      <input type="hidden" name="category_id" id="cat-id" value="">

      <div class="form-group">
        <label for="cat-name">Category Name</label>
        <input type="text" id="cat-name" name="name" placeholder="e.g. Housing" required>
      </div>

      <div class="form-group">
        <label for="cat-budget">Monthly Budget</label>
        <input type="number" id="cat-budget" name="budget" placeholder="0.00" step="0.01" min="0" required>
      </div>

      <div class="modal-actions">
        <button type="button" class="modal-cancel" onclick="closeCategoryModal()">Cancel</button>
        <button type="submit" class="modal-save" id="category-save-btn">Save Category</button>
      </div>
    </form>
  </div>
</div>
