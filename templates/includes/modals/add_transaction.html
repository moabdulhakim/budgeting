<div id="tx-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 style="font-size: 1.25rem; font-weight: 700;">Add Transaction</h2>
    </div>

    <form method="POST" action="{% url 'add_transaction' %}">
      {% csrf_token %}

      <div class="form-group">
        <label for="tx-name">Transaction Name</label>
        <input type="text" id="tx-name" name="name" placeholder="e.g. Grocery Store" required>
      </div>

      <div class="form-group">
        <label for="tx-amount">Amount</label>
        <input type="number" id="tx-amount" name="amount" placeholder="0.00" step="0.01" min="0" required>
      </div>

      <div class="form-group">
        <label for="tx-type">Type</label>
        <select id="tx-type" name="type" style="width:100%;padding:12px;border-radius:10px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-family:inherit;outline:none;">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>

      <div class="form-group">
        <label for="tx-category">Category</label>
        <input type="text" id="tx-category" name="category" placeholder="e.g. Food" required>
      </div>

      <div class="modal-actions">
        <button type="button" class="modal-cancel" onclick="document.getElementById('tx-modal').classList.remove('active')">Cancel</button>
        <button type="submit" class="modal-save">Add Transaction</button>
      </div>
    </form>
  </div>
</div>
