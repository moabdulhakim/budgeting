<div id="tx-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="tx-modal-title" style="font-size: 1.25rem; font-weight: 700;">Add Transaction</h2>
    </div>

    <form method="POST" action="{% url 'add_transaction' %}" id="tx-form">
      {% csrf_token %}

      <div class="form-group">
        <label for="tx-name">Transaction Name</label>
        <input type="text" id="tx-name" name="name" placeholder="e.g. Grocery Store" required>
      </div>

      <!-- Amount + Currency side-by-side -->
      <div class="form-group">
        <label for="tx-amount">Amount</label>
        <div class="fx-amount-row">
          <input type="number" id="tx-amount" name="amount" placeholder="0.00"
                 step="0.01" min="0" required class="fx-amount-input">
          <select id="tx-currency" name="currency" class="fx-currency-select">
            <option value="USD">🇺🇸 USD</option>
          </select>
        </div>
        <!-- Live conversion preview -->
        <div id="fx-preview" class="fx-preview" style="display:none;"></div>
      </div>

      <div class="form-group">
        <label for="tx-type">Type</label>
        <select id="tx-type" name="type" style="width:100%;padding:12px;border-radius:10px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-family:inherit;outline:none;">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>

      <div class="form-group">
        <label for="tx-category">Category</label>
        <input type="text" id="tx-category" name="category" placeholder="e.g. Food" required>
      </div>

      <div class="form-group">
        <label for="tx-date">Transaction date</label>
        <input type="date" id="tx-date" name="tx_date">
      </div>

      <div class="form-group form-group-inline">
        <label class="checkbox-label">
          <input type="checkbox" name="is_upcoming" value="1" id="tx-upcoming">
          Upcoming (bill / planned payment)
        </label>
      </div>

      <div class="form-group" id="tx-due-wrap" style="display:none;">
        <label for="tx-due-date">Due date</label>
        <input type="date" id="tx-due-date" name="due_date">
        <p class="form-hint">When marked upcoming, a blue alert shows on the Dashboard if the due date is within 10 days (today through due date).</p>
      </div>

      <div class="modal-actions">
        <button type="button" class="modal-cancel" onclick="closeTransactionModal()">Cancel</button>
        <button type="submit" class="modal-save" id="tx-submit-btn">Add Transaction</button>
      </div>
    </form>
  </div>
</div>

<script>
(function () {
  const FX_URL  = "{% url 'get_fx_rates' %}";
  const select  = document.getElementById('tx-currency');
  const amtIn   = document.getElementById('tx-amount');
  const preview = document.getElementById('fx-preview');

  let rates = {};   // { EUR: 0.92, EGP: 49.1, ... }

  // ── Populate dropdown from API ────────────────────────────────────────────
  fetch(FX_URL, { credentials: 'same-origin' })
    .then(r => r.json())
    .then(data => {
      rates = data.rates || {};
      const currencies = data.currencies || {};

      // Clear placeholder, rebuild options
      select.innerHTML = '';
      Object.entries(currencies).forEach(([code, label]) => {
        const opt = document.createElement('option');
        opt.value = code;
        opt.textContent = label;
        if (code === 'USD') opt.selected = true;
        select.appendChild(opt);
      });
    })
    .catch(() => {
      // Leave "USD" placeholder if API fails — still works
    });

  // ── Live conversion preview ───────────────────────────────────────────────
  function updatePreview() {
    const currency = select.value;
    const amount   = parseFloat(amtIn.value);

    if (!amount || isNaN(amount) || currency === 'USD') {
      preview.style.display = 'none';
      return;
    }

    const rate = rates[currency];
    if (!rate) { preview.style.display = 'none'; return; }

    const usd = (amount / rate).toFixed(2);
    preview.style.display = 'flex';
    preview.innerHTML =
      `<span class="fx-eq">≈</span>` +
      `<strong>$${usd} USD</strong>` +
      `<span class="fx-rate">@ 1 ${currency} = ${(1 / rate).toFixed(4)} USD</span>`;
  }

  select.addEventListener('change', updatePreview);
  amtIn.addEventListener('input',   updatePreview);
})();
</script>
