<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Goal</title>

    <style>
        * {
            background-color: black;
        }

        label {
            color: white;
        }

        input {
            background-color: rgb(20, 20, 20);
            color: white;
            border: 1px solid rgb(40, 40, 40);
        }

        textarea {
            background-color: rgb(20, 20, 20);
            color: white;
            border: 1px solid rgb(40, 40, 40);
        }

        button {
            background-color: rgb(20, 20, 20);
            color: white;
            border: 1px solid rgb(40, 40, 40);
            cursor: pointer;
        }
        form {
            display: flex;
            flex-direction: column;
            width: 25%;
            gap: 20px;
            margin: auto;
        }

        input[type="submit"] {
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }
        input,
        textarea {
            padding: 10px;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 2rem;
        }

        header {
            margin-left: 10%;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            padding: 10px;
            display: block;
            width: fit-content;
        }
    </style>
</head>
<body>
    <header>
        <a href="/goals">Back</a>
    </header>
    <h1>Create Goal</h1>
    <!-- 
fields = [
        'name', required
        'description', optional
        'dueDate', optional
        'target', required
        'current', optional default 0.0
    ] 
-->
<!-- required stars are next to the label -->
<!-- Write a form with above fields inside a POST form -->
<form action="" method="post">
    {% csrf_token %}
    
    <!-- name input field -->
    <label for="name">Name: *</label>
    <input type="text" id="name" name="name" placeholder="Name" required>

    <!-- description textarea field -->
    <label for="description">Description:</label>
    <textarea id="description" name="description" placeholder="Description"></textarea>

    <!-- dueDate date input field -->
    <label for="dueDate">Due Date:</label>
    <input type="date" id="dueDate" name="dueDate" placeholder="Due Date">

    <!-- target number input field -->
    <label for="target">Target: *</label>
    <input type="number" id="target" name="target" placeholder="Target" required step="0.01" min="0">

    <!-- current number input field -->
    <label for="current">Current:</label>
    <input type="number" id="current" name="current" placeholder="Current" value="0" step="0.01" min="0">

    <!-- submit button -->
    <button type="submit">Create Goal</button>
</form>
</body>
</html>
