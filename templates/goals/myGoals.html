<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <a href="/goals/create">Create Goal</a>
        <a href="/logout">Logout</a>
    </header>
    {% for goal in goals %}
        <a href="{{ goal.id }}/" style="color: black; text-decoration: none; display: block;" >
            <h1>{{ goal.name }}</h1>
            <p>{{ goal.description }}</p>
            <p>{{ goal.dueDate }}</p>
            <p>{{ goal.target }}</p>
            <p>{{ goal.current }}</p>

            <a href="{{ goal.id }}/update" style="color: black; text-decoration: none; display: block;">Update Goal</a>
        </a>
    {% endfor %}
</body>
</html>
